<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>JVF DTM Viewer</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d1117;overflow:hidden;font-family:'Consolas',monospace;color:#c9d1d9}
  #ui{position:absolute;top:12px;left:12px;display:flex;flex-direction:column;gap:8px;
      width:240px;pointer-events:none;z-index:10;max-height:calc(100vh - 24px)}
  .panel{background:rgba(13,17,23,.88);border:1px solid #30363d;border-radius:6px;
         padding:9px 13px;font-size:11.5px;line-height:1.65;pointer-events:auto;backdrop-filter:blur(4px)}
  .panel h3{color:#58a6ff;font-size:12.5px;margin-bottom:5px}
  #stats{color:#8b949e} #stats b{color:#c9d1d9}
  #lpanel{overflow-y:auto;flex-shrink:1;min-height:0}
  .legend-row{display:flex;align-items:center;gap:6px;margin:1px 0;cursor:pointer;user-select:none;font-size:11px}
  .legend-row:hover .lbl{color:#e6edf3} .legend-row.off{opacity:.3}
  .sw-line{width:16px;height:2px;border-radius:1px;flex-shrink:0}
  .sw-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .btn-row{display:flex;gap:6px}
  button{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11.5px}
  button:hover{background:#30363d}
  #hint{color:#6e7681;font-size:10.5px;pointer-events:none}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:rgba(13,17,23,.97);font-size:1.1em;color:#58a6ff;z-index:20;transition:opacity .3s}
  #overlay.gone{opacity:0;pointer-events:none} #overlay small{font-size:.6em;color:#6e7681} #overlay.err{color:#f87171}
  #open-btn{cursor:pointer;background:#21262d;border:1px solid #58a6ff;color:#58a6ff;padding:10px 28px;border-radius:7px;font-size:1em}
  #open-btn:hover{background:#1c3a5e}
  #tooltip{position:absolute;bottom:12px;left:12px;display:none;background:rgba(13,17,23,.92);border:1px solid #30363d;border-radius:6px;padding:6px 11px;font-size:11px;pointer-events:none;z-index:10;color:#8b949e}
  #tooltip b{color:#c9d1d9}
  #fname{position:absolute;top:12px;right:12px;background:rgba(13,17,23,.75);border:1px solid #30363d;border-radius:5px;padding:4px 10px;font-size:11px;color:#6e7681;z-index:10;pointer-events:none;max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>
<div id="overlay">
  <label id="open-btn">📂 Otevřít JVF XML soubor<input type="file" accept=".xml,.jvf" id="file-input" style="display:none"></label>
  <small>nebo přetáhněte soubor sem</small>
  <small id="omsg">EPSG:5514 &nbsp;·&nbsp; JVF DTM 1.4.3</small>
</div>
<div id="fname"></div>
<div id="ui">
  <div class="panel"><h3>JVF DTM Viewer</h3><div id="stats">Čeká na soubor…</div></div>
  <div class="panel" id="lpanel" style="display:none">
    <h3>Vrstvy <span style="color:#6e7681;font-weight:normal;font-size:10px">(klik = skrýt/zobrazit)</span></h3>
    <div id="legend"></div>
  </div>
  <div class="panel"><div class="btn-row"><button onclick="fitCam()">⟳ Fit</button><button onclick="topCam()">⊞ Shora</button></div></div>
  <div class="panel" id="hint">Orbit: LMB &nbsp;|&nbsp; Pan: RMB &nbsp;|&nbsp; Zoom: kolečko<br>Hover = souřadnice</div>
</div>
<div id="tooltip"></div>
<script src="libs/three.min.js"></script>
<script src="libs/OrbitControls.js"></script>
<script src="colors.js"></script>
<script>
if(typeof THREE==='undefined'){document.getElementById('omsg').textContent='Chyba: libs/three.min.js nenalezeno – spustte download_libs.bat';document.getElementById('overlay').classList.add('err');throw new Error('THREE not loaded');}
</script>

  TrasaVodovodniPripojky: {color:0x34d399, sz:1, type:'ln', group:'Vodovod / kanalizace'},
  TrasaVodovodniSite: {color:0x34d399, sz:1, type:'ln', group:'Vodovod / kanalizace'},
  VodovodKoridorZameruLinie: {color:0x34d399, sz:1, type:'ln', group:'Vodovod / kanalizace'},
  VodovodMistoZameruBod: {color:0x34d399, sz:5, type:'pt', group:'Vodovod / kanalizace'},
  ZarizeniKanalizacniPripojkyBod: {color:0x34d399, sz:5, type:'pt', group:'Vodovod / kanalizace'},
  ZarizeniKanalizacniPripojkyDefinicniBod: {color:0x34d399, sz:5, type:'pt', group:'Vodovod / kanalizace'},
  ZarizeniVodovodniPripojkyBod: {color:0x34d399, sz:5, type:'pt', group:'Vodovod / kanalizace'},
  ZarizeniVodovodniPripojkyDefinicniBod: {color:0x34d399, sz:5, type:'pt', group:'Vodovod / kanalizace'},
  // ── Vodstvo
  HraniceVodnihoDila: {color:0x38bdf8, sz:1, type:'ln', group:'Vodstvo'},

  ObjektOdvodneniStavbyLinie: {color:0x38bdf8, sz:1, type:'ln', group:'Vodstvo'},
  ObjektZarizeniOchranaPredPovodnemiBod: {color:0x38bdf8, sz:5, type:'pt', group:'Vodstvo'},
  ObjektZarizeniOchranaPredPovodnemiLinie: {color:0x38bdf8, sz:1, type:'ln', group:'Vodstvo'},
  OsaMelioracnihoPrikopuZlabuDrenu: {color:0x38bdf8, sz:1, type:'ln', group:'Vodstvo'},
  OsaProtipovodnoveZabrany: {color:0x38bdf8, sz:1, type:'ln', group:'Vodstvo'},
  PlavebniKomoraBod: {color:0x38bdf8, sz:5, type:'pt', group:'Vodstvo'},
  PrivadecNahonOdpadLinie: {color:0x38bdf8, sz:1, type:'ln', group:'Vodstvo'},
  PrivadecPovrchovychVodKoridorZameruLinie: {color:0x38bdf8, sz:1, type:'ln', group:'Vodstvo'},
  ProtipovodnovaZabranaDefinicniBod: {color:0x38bdf8, sz:5, type:'pt', group:'Vodstvo'},
  ProtipovodnovaZabranaLinie: {color:0x38bdf8, sz:1, type:'ln', group:'Vodstvo'},
  ProtipovodnoveOpatreniKoridorZameruLinie: {color:0x38bdf8, sz:1, type:'ln', group:'Vodstvo'},
  SledovanaVodniCestaLinie: {color:0x38bdf8, sz:1, type:'ln', group:'Vodstvo'},
  StavebneUpraveneKorytoDefinicniBod: {color:0x38bdf8, sz:5, type:'pt', group:'Vodstvo'},
  SterkovaPrehrazkaDefinicniBod: {color:0x38bdf8, sz:5, type:'pt', group:'Vodstvo'},
  StudnaNaVerejnemProstranstvi: {color:0x38bdf8, sz:5, type:'pt', group:'Vodstvo'},
  SuchaNadrzDefinicniBod: {color:0x38bdf8, sz:5, type:'pt', group:'Vodstvo'},
  VodniTokDefinicniBod: {color:0x38bdf8, sz:5, type:'pt', group:'Vodstvo'},
  ZahradniBazenDefinicniBod: {color:0x38bdf8, sz:5, type:'pt', group:'Vodstvo'},
  ZatrubnenyVodniTok: {color:0x38bdf8, sz:1, type:'ln', group:'Vodstvo'},
  // ── Zdi
  HraniceZdi: {color:0xfacc15, sz:1, type:'ln', group:'Zdi'},
  ZedDefinicniBod: {color:0xfacc15, sz:5, type:'pt', group:'Zdi'},
  ZedLinie: {color:0xfacc15, sz:1, type:'ln', group:'Zdi'},
};
</script>
<script>

const MY_COLORS = window.MY_COLORS || {};
const LAYERS = {};
for(const [k,v] of Object.entries(SCHEMA_LAYERS))
  LAYERS[k] = Object.assign({}, v, MY_COLORS[k]||{});
function hashColor(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return((h>>>0)&0xFFFFFF)|0x404040;}
function layerCfg(n,g){return LAYERS[n]||{color:hashColor(n),sz:g==='pt'?3:1,type:g,group:'Neznámé'};}
function isKnown(n){return !!LAYERS[n];}

// Metadata boundaries (treated like OblastZmeny - hidden, excluded from fit)
const META_SECTIONS = ['OblastZmeny','ObvodDatoveSady'];

const GML='http://www.opengis.net/gml/3.2';
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0d1117);
const camera=new THREE.PerspectiveCamera(55,innerWidth/innerHeight,0.01,1e6);
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);
const controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.1;controls.enableZoom=false;
scene.add(new THREE.GridHelper(200,40,0x1c2128,0x161b22));
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});

// objs: {mesh, layerKey, zapis}
// vis:  layerKey → bool
// zapisVis: zapis letter → bool
let objs=[],vis={},hits=[],orig=null;
let zapisVis={i:true, u:true, r:true, d:false};

function meshShouldBeVisible(o){
  return vis[o.layerKey] && zapisVis[o.zapis];
}
function reapplyVisibility(){
  for(const o of objs) o.mesh.visible = meshShouldBeVisible(o);
}

// Recompute fit box from currently visible meshes
function computeFitBox(){
  const b=new THREE.Box3();
  for(const o of objs){
    if(o.mesh.visible && !META_SECTIONS.includes(o.layerKey))
      b.union(new THREE.Box3().setFromObject(o.mesh));
  }
  return b.isEmpty()?null:b;
}

function readFile(f){
  if(!f)return;
  document.getElementById('fname').textContent=f.name;
  const r=new FileReader();
  r.onload=ev=>{try{parse(ev.target.result);}catch(e){showErr(e.message);console.error(e);}};
  r.readAsText(f,'UTF-8');
}
document.getElementById('file-input').addEventListener('change',function(){readFile(this.files[0]);});
['dragenter','dragover','dragleave','drop'].forEach(n=>document.addEventListener(n,e=>{e.preventDefault();e.stopPropagation();}));
document.addEventListener('drop',e=>readFile(e.dataTransfer.files[0]));
function showErr(m){const o=document.getElementById('overlay');o.classList.remove('gone');o.classList.add('err');document.getElementById('omsg').textContent='Chyba: '+m;}

function upTo(node,names){let n=node.parentNode;while(n&&n.nodeType===1){if(names.indexOf(n.localName)!==-1)return n;n=n.parentNode;}return null;}
function dataSection(node){let n=node.parentNode;while(n&&n.nodeType===1){if(n.parentNode&&n.parentNode.localName==='Data')return n;n=n.parentNode;}return null;}
function nums(text){return text.trim().split(/\s+/).map(parseFloat).filter(v=>!isNaN(v));}
function zapisObjektu(node){
  const z=upTo(node,['ZaznamObjektu']);
  if(!z)return 'i';
  for(const c of z.childNodes)if(c.localName==='ZapisObjektu')return c.textContent.trim();
  return 'i';
}
function sc(Y,X,H){return new THREE.Vector3(Y-orig.Y,(H||0)-orig.H,-(X-orig.X));}

function parse(xml){
  for(const {mesh} of objs)scene.remove(mesh);
  objs=[];hits=[];vis={};orig=null;
  // reset zapis checkboxes
  zapisVis={i:true,u:true,r:true,d:false};

  const doc=new DOMParser().parseFromString(xml,'application/xml');
  const perr=doc.querySelector('parsererror');
  if(perr)throw new Error('XML parse error: '+perr.textContent.slice(0,80));

  // Collect per layer+zapis
  // C[layerKey][zapis] = {pts:[], lines:[]}
  const C={};
  function bucket(k,z){
    if(!C[k])C[k]={};
    if(!C[k][z])C[k][z]={pts:[],lines:[]};
    return C[k][z];
  }

  const posN=doc.getElementsByTagNameNS(GML,'pos');
  for(let i=0;i<posN.length;i++){
    const v=nums(posN[i].textContent);if(v.length<2)continue;
    if(!orig)orig={Y:v[0],X:v[1],H:v[2]||0};
    if(upTo(posN[i],META_SECTIONS))continue;
    const sec=dataSection(posN[i]);const k=sec?sec.localName:'_pt';
    const z=zapisObjektu(posN[i]);
    bucket(k,z).pts.push({Y:v[0],X:v[1],H:v[2]||0});
  }
  const plN=doc.getElementsByTagNameNS(GML,'posList');
  for(let i=0;i<plN.length;i++){
    const node=plN[i];
    const lsEl=upTo(node,['LineString','LinearRing']);
    const dim=lsEl?(parseInt(lsEl.getAttribute('srsDimension'))||3):3;
    const v=nums(node.textContent);if(v.length<dim*2)continue;
    if(!orig)orig={Y:v[0],X:v[1],H:v[2]||0};
    const pts=[];for(let j=0;j+dim-1<v.length;j+=dim)pts.push({Y:v[j],X:v[j+1],H:v[j+2]||0});
    let k='_ln';
    if(upTo(node,META_SECTIONS)){
      // detect which meta section
      for(const ms of META_SECTIONS){if(upTo(node,[ms])){k=ms;break;}}
    } else {
      const sec=dataSection(node);if(sec)k=sec.localName;
    }
    const z=zapisObjektu(node);
    bucket(k,z).pts.length===0&&0; // just ensure bucket exists
    bucket(k,z).lines.push(pts);
  }
  if(!orig)throw new Error('Žádná data nenalezena.');

  let nP=0,nL=0;
  const layerStats=[];   // {key, cfg, gt, counts:{i,u,r,d}}
  const zapisFound=new Set();

  for(const [key,byZapis] of Object.entries(C)){
    const gt=Object.values(byZapis).some(b=>b.pts.length)?'pt':'ln';
    const cfg=layerCfg(key,gt);
    const known=isKnown(key);
    const isMeta=META_SECTIONS.includes(key);

    // Layer visibility: unknown or meta → off by default
    vis[key] = known && !isMeta;

    const counts={};
    for(const [z,data] of Object.entries(byZapis)){
      zapisFound.add(z);
      counts[z]=(data.pts.length||0)+(data.lines.length||0);
      const color = z==='d' ? 0x555555 : cfg.color;
      const opacity = z==='d' ? 0.45 : 1;

      if(data.pts.length){
        const verts=data.pts.map(p=>{
          const v=sc(p.Y,p.X,p.H);
          if(z!=='d')hits.push({pos3:v,raw:p,label:cfg.group+' · '+key});
          return v;
        });
        const geo=new THREE.BufferGeometry().setFromPoints(verts);
        const mat=new THREE.PointsMaterial({color,size:cfg.sz||3,sizeAttenuation:false,opacity,transparent:opacity<1});
        const mesh=new THREE.Points(geo,mat);
        scene.add(mesh);
        objs.push({mesh,layerKey:key,zapis:z});
        nP+=data.pts.length;
      }
      if(data.lines.length){
        const verts=[];
        for(const line of data.lines){
          for(let i=0;i<line.length-1;i++){
            verts.push(sc(line[i].Y,line[i].X,line[i].H),sc(line[i+1].Y,line[i+1].X,line[i+1].H));
          }
          nL++;
        }
        const geo=new THREE.BufferGeometry().setFromPoints(verts);
        const mat=new THREE.LineBasicMaterial({color,opacity,transparent:opacity<1});
        const mesh=new THREE.LineSegments(geo,mat);
        scene.add(mesh);
        objs.push({mesh,layerKey:key,zapis:z});
      }
    }
    layerStats.push({key,cfg,gt,counts,known,isMeta});
  }

  // Apply initial visibility
  reapplyVisibility();

  // ── Stats ──────────────────────────────────────────────────────────────────
  document.getElementById('stats').innerHTML=`<b>${nP}</b> bodů &nbsp;|&nbsp; <b>${nL}</b> linií`;

  // ── Legend ─────────────────────────────────────────────────────────────────
  const leg=document.getElementById('legend');leg.innerHTML='';

  // Zapis checkboxes at top
  const zapLabels={i:'Vložené (i)',u:'Upravené (u)',r:'Referenční (r)',d:'Smazané (d)'};
  const zapColors={i:'#c9d1d9',u:'#93c5fd',r:'#86efac',d:'#555'};
  const zapOrder=['i','u','r','d'].filter(z=>zapisFound.has(z));
  if(zapOrder.length>0){
    const hdr=document.createElement('div');
    hdr.style.cssText='color:#6e7681;font-size:10px;margin:2px 0 3px;letter-spacing:.04em;text-transform:uppercase';
    hdr.textContent='Záznamy';leg.appendChild(hdr);
    const zapRow=document.createElement('div');
    zapRow.style.cssText='display:flex;flex-wrap:wrap;gap:6px 10px;margin-bottom:4px';
    for(const z of zapOrder){
      const wrap=document.createElement('label');
      wrap.style.cssText='display:flex;align-items:center;gap:4px;cursor:pointer;font-size:11px';
      const cb=document.createElement('input');
      cb.type='checkbox';cb.checked=zapisVis[z]!==false;
      cb.style.cssText='cursor:pointer;accent-color:#58a6ff;flex-shrink:0';
      cb.addEventListener('change',()=>{
        zapisVis[z]=cb.checked;
        reapplyVisibility();
        // recompute fit box silently (don't move camera)
      });
      const sp=document.createElement('span');
      sp.style.color=zapColors[z]||'#c9d1d9';
      sp.textContent=zapLabels[z]||z;
      wrap.appendChild(cb);wrap.appendChild(sp);
      zapRow.appendChild(wrap);
    }
    leg.appendChild(zapRow);
    const sep=document.createElement('div');sep.style.cssText='border-top:1px solid #21262d;margin:4px 0 5px';leg.appendChild(sep);
  }

  // Layer rows grouped
  layerStats.sort((a,b)=>{
    // unknown last, then meta, then by group+key
    if(a.known!==b.known)return a.known?-1:1;
    if(a.isMeta!==b.isMeta)return a.isMeta?1:-1;
    return a.cfg.group.localeCompare(b.cfg.group)||a.key.localeCompare(b.key);
  });
  let lastGroup=null;
  for(const {key,cfg,gt,counts,known,isMeta} of layerStats){
    const grp=cfg.group+(isMeta?' (meta)':!known?' (neznámé)':'');
    if(grp!==lastGroup){
      if(lastGroup!==null){const sep=document.createElement('div');sep.style.cssText='border-top:1px solid #21262d;margin:4px 0 2px';leg.appendChild(sep);}
      const hdr=document.createElement('div');
      hdr.style.cssText='color:#6e7681;font-size:10px;margin:2px 0 1px;letter-spacing:.04em;text-transform:uppercase';
      hdr.textContent=grp;leg.appendChild(hdr);
      lastGroup=grp;
    }
    const col='#'+new THREE.Color(cfg.color||0x888888).getHexString();
    const total=Object.values(counts).reduce((a,b)=>a+b,0);
    const row=document.createElement('div');row.className='legend-row';
    if(!vis[key])row.classList.add('off');
    row.innerHTML=`<span class="${gt==='ln'?'sw-line':'sw-dot'}" style="background:${col}"></span><span class="lbl">${key} <span style="color:#6e7681">(${total})</span></span>`;
    row.addEventListener('click',()=>{
      vis[key]=!vis[key];
      reapplyVisibility();
      row.classList.toggle('off',!vis[key]);
    });
    leg.appendChild(row);
  }

  document.getElementById('lpanel').style.display='';
  fitCam();
  document.getElementById('overlay').classList.add('gone');
}

// Fit uses only currently visible non-meta meshes
function fitCam(){
  const b=computeFitBox(); if(!b)return;
  const c=new THREE.Vector3(),s=new THREE.Vector3();
  b.getCenter(c);b.getSize(s);
  const r=Math.max(s.x,s.z)*0.9+1;
  controls.target.set(c.x,0,c.z);
  camera.position.set(c.x+r,r*0.8,c.z+r);
  camera.near=r*0.0005;camera.far=r*30;
  camera.updateProjectionMatrix();controls.update();
}
function topCam(){
  const b=computeFitBox(); if(!b)return;
  const c=new THREE.Vector3(),s=new THREE.Vector3();
  b.getCenter(c);b.getSize(s);
  const d=Math.max(s.x,s.z)*1.2+1;
  controls.target.set(c.x,0,c.z);
  camera.position.set(c.x,d,c.z+0.001);controls.update();
}

const mouse=new THREE.Vector2(-9999,-9999);
renderer.domElement.addEventListener('wheel',e=>{
  e.preventDefault();
  const dir=new THREE.Vector3(mouse.x,mouse.y,0.5).unproject(camera).sub(camera.position).normalize();
  const dist=camera.position.distanceTo(controls.target);
  const move=dist*(e.deltaY>0?-0.05:0.05);
  camera.position.addScaledVector(dir,move);controls.target.addScaledVector(dir,move);controls.update();
},{passive:false});

const caster=new THREE.Raycaster();
window.addEventListener('mousemove',e=>{mouse.x=(e.clientX/innerWidth)*2-1;mouse.y=-(e.clientY/innerHeight)*2+1;});
function updateTip(){
  if(!hits.length)return;
  const b=computeFitBox();if(!b)return;
  caster.setFromCamera(mouse,camera);
  const sz=new THREE.Vector3();b.getSize(sz);const thr=sz.length()*0.015;
  let best=null,bd=Infinity;
  for(const h of hits){const d=caster.ray.distanceToPoint(h.pos3);if(d<bd){bd=d;best=h;}}
  const tt=document.getElementById('tooltip');
  if(best&&bd<thr){tt.style.display='block';tt.innerHTML=`<b>${best.label}</b><br>Y&nbsp;${best.raw.Y.toFixed(3)}<br>X&nbsp;${best.raw.X.toFixed(3)}<br>H&nbsp;${best.raw.H.toFixed(3)}`;}
  else tt.style.display='none';
}
(function anim(){requestAnimationFrame(anim);controls.update();updateTip();renderer.render(scene,camera);})();

</script>
